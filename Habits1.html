<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Offline Habit Tracker</title>

<style>
*{
box-sizing:border-box;
font-family:Segoe UI,Arial,sans-serif;
}

body{
margin:0;
background:#f4f6fb;
color:#333;
}

header{
background:#3f51b5;
color:white;
padding:20px;
font-size:28px;
font-weight:bold;
}

.container{
padding:20px;
max-width:1500px;
margin:auto;
}

.controls{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:20px;
}

input[type=text]{
padding:10px;
border-radius:8px;
border:1px solid #bbb;
font-size:16px;
}

input[type=color]{
width:50px;
height:42px;
border:none;
}

button{
padding:10px 18px;
border:none;
border-radius:8px;
cursor:pointer;
background:#3f51b5;
color:white;
font-size:15px;
}

button:hover{
opacity:.9;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
border:1px solid #ddd;
text-align:center;
padding:6px;
}

th{
background:#eceff1;
position:sticky;
top:0;
}

.habit-name{
font-weight:bold;
text-align:left;
padding-left:10px;
min-width:180px;
}

.cell{
width:28px;
height:28px;
cursor:pointer;
transition:.2s;
}

.cell:hover{
transform:scale(1.15);
}

.progressBar{
height:14px;
background:#ddd;
border-radius:20px;
overflow:hidden;
margin-top:6px;
}

.progressFill{
height:100%;
}

.actionBtn{
margin:2px;
padding:5px 8px;
font-size:12px;
}

footer{
margin-top:30px;
color:#777;
text-align:center;
}

</style>

</head>
<body>

<header>
Offline Habit Tracker
</header>

<div class="container">

<div class="controls">

<input id="habitName" placeholder="Habit name">

<input id="habitColor" type="color" value="#4caf50">

<button onclick="addHabit()">Add Habit</button>

<button onclick="exportData()">Export</button>

<button onclick="document.getElementById('import').click()">Import</button>

<input type="file" id="import" hidden>

</div>

<div id="tracker"></div>

<footer>
Offline • Stored in your browser
</footer>

</div>

<script>

const STORAGE="habit_tracker_month";

let today=new Date();

let year=today.getFullYear();

let month=today.getMonth();

let days=new Date(year,month+1,0).getDate();

let habits=JSON.parse(localStorage.getItem(STORAGE)||"[]");

document.getElementById("import").addEventListener("change",importData);

function save(){
localStorage.setItem(STORAGE,JSON.stringify(habits));
render();
}

function addHabit(){

const name=document.getElementById("habitName").value.trim();

if(!name)return;

const color=document.getElementById("habitColor").value;

habits.push({
id:Date.now(),
name,
color,
days:Array(days).fill(false)
});

document.getElementById("habitName").value="";

save();

}

function toggle(h,d){

habits[h].days[d]=!habits[h].days[d];

save();

}

function editHabit(index){

let n=prompt("Habit name",habits[index].name);

if(n===null)return;

habits[index].name=n;

let c=prompt("Color (#hex)",habits[index].color);

if(c)habits[index].color=c;

save();

}

function deleteHabit(index){

if(confirm("Delete habit?")){

habits.splice(index,1);

save();

}

}

function render(){

let html="<table>";

html+="<tr>";

html+="<th>Habit</th>";

for(let d=1;d<=days;d++){

html+="<th>"+d+"</th>";

}

html+="<th>Progress</th>";

html+="<th>Actions</th>";

html+="</tr>";

habits.forEach((habit,h)=>{

html+="<tr>";

html+="<td class='habit-name'>"+habit.name+"</td>";

habit.days.forEach((done,d)=>{

html+="<td>";

html+="<div class='cell' onclick='toggle("+h+","+d+")' style='background:"+(done?habit.color:"#eee")+"'></div>";

html+="</td>";

});

let count=habit.days.filter(x=>x).length;

let pct=Math.round(count/days*100);

html+="<td width='180'>";

html+=count+"/"+days;

html+="<div class='progressBar'>";

html+="<div class='progressFill' style='width:"+pct+"%;background:"+habit.color+"'></div>";

html+="</div>";

html+="</td>";

html+="<td>";

html+="<button class='actionBtn' onclick='editHabit("+h+")'>Edit</button>";

html+="<button class='actionBtn' onclick='deleteHabit("+h+")'>Delete</button>";

html+="</td>";

html+="</tr>";

});

html+="</table>";

document.getElementById("tracker").innerHTML=html;

}

function exportData(){

const blob=new Blob([JSON.stringify(habits,null,2)],{type:"application/json"});

const a=document.createElement("a");

a.href=URL.createObjectURL(blob);

a.download="habit-tracker.json";

a.click();

}

function importData(e){

const file=e.target.files[0];

if(!file)return;

const reader=new FileReader();

reader.onload=function(){

try{

habits=JSON.parse(reader.result);

save();

}catch{

alert("Invalid file");

}

};

reader.readAsText(file);

}

render();

</script>

</body>
</html>
